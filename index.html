    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #D8D3CC;
      font-family: Georgia, 'Times New Roman', serif;
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 320px;
      background: #F3EFEA;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 32px 36px;
      box-shadow: 0 8px 32px rgba(60,50,40,0.18), 0 2px 8px rgba(60,50,40,0.10);

      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 36px;
    }

    .logo-wrap svg {
      width: 220px;
      height: auto;
    }

    .rule {
      width: 32px;
      height: 0.5px;
      background: #B99A5C;
      margin: 0 auto 28px;
    }

    .contacts {
      width: 100%;
      margin-bottom: 18px;
    }

    .row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
      text-decoration: none;
      transition: opacity .15s;
    }

    .row:hover { opacity: .65; }

    .row svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
      stroke: #B99A5C;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .row span {
      font-size: 12.5px;
      letter-spacing: 0.03em;
      color: #5a5248;
      line-height: 1.6;
    }

    .rule2 {
      width: 100%;
      height: 0.5px;
      background: #ddd8d2;
      margin: 16px 0;
    }

    .atend {
      font-size: 9.5px;
      letter-spacing: 0.16em;
      color: #B8B1A6;
      text-align: center;
      line-height: 2.1;
    }
  </style>
